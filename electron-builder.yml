# electron-builder.yml — F1-02 packaging, F1-09 update feed, F1-10 signing.
#
# SCOPE. This produces a RUNNABLE, DISTRIBUTABLE app. F1-02 established the
# targets and the file lists; F1-09 added the `publish` feed that becomes
# app-update.yml inside the artifact; F1-10 added macOS signing, the hardened
# runtime entitlements and the notarisation hook. What is set here are the
# things that are wrong by DEFAULT for this app and would silently ship broken.
#
# Targets are the ones design §6.1 fixes:
#   Windows NSIS — MSI is not an option, electron-updater cannot update it
#   macOS dmg + zip — the zip is not optional even when only shipping a dmg,
#     because Squirrel.Mac updates via zip
#   Linux AppImage AND deb — deb is close to mandatory: Chromium's SUID sandbox
#     needs chrome-sandbox root-owned 4755, a user-owned FUSE mount cannot
#     provide that, and Ubuntu 23.10+ blocks the namespace fallback, so an
#     AppImage alone fails to launch without --no-sandbox

appId: dev.naby.app
productName: Naby
copyright: Naby

directories:
  output: release
  # `build/` holds icon.png and entitlements.mac.plist. electron-builder derives
  # the .icns and .ico from that single PNG; there are no per-platform icon files
  # to keep in sync.
  #
  # icon.png is the REAL Naby artwork (1024×1024 RGBA), upscaled from
  # `assets/naby-icon-source.png` (512×512), which is kept as the editable
  # master. The generated placeholder it replaced is gone; `scripts/make-icon.mjs`
  # still exists but is now only a fallback for a checkout without the artwork —
  # running it would OVERWRITE the real icon, so do not.
  buildResources: build

# ---------------------------------------------------------------------------
# afterSign — notarisation (F1-10)
# ---------------------------------------------------------------------------
# Runs after the .app is signed and BEFORE the dmg/zip are built, which is the
# only correct moment: a zip cannot be stapled, so the ticket must land in the
# bundle while it is still a bundle. See scripts/notarize.mjs.
afterSign: scripts/notarize.mjs

# ---------------------------------------------------------------------------
# afterAllArtifactBuild — notarise the .dmg itself (F1-10)
# ---------------------------------------------------------------------------
# A SECOND notarisation, not a duplicate. A ticket covers one container: the
# hook above tickets the .app, this one tickets the .dmg the user downloads.
# Without it, opening the downloaded disk image needs a live round trip to
# Apple, and when that round trip fails the dialog says the image is damaged.
# The .zip is skipped — a zip cannot hold a staple, and the .app inside it
# already has one, which is what Squirrel validates.
afterAllArtifactBuild: scripts/notarize-dmg.mjs

# ---------------------------------------------------------------------------
# publish — the update feed (F1-09, design §6.3)
# ---------------------------------------------------------------------------
# GitHub Releases on leonardo204/naby, which is PUBLIC. That is the deciding
# property, not a convenience:
#
#   A PRIVATE repo feed requires a GH_TOKEN baked into the installer, readable by
#   anyone who unpacks it (design §6.3) — a published credential with repo scope.
#   A public repo needs no token in the artifact at all. Publishing still needs a
#   token, but only at RELEASE time, in CI, where it never enters the build.
#
# This block is what electron-builder turns into `app-update.yml` inside the
# packaged app, and app-update.yml is the ONLY thing electron-updater consults at
# runtime. The updater cannot be pointed anywhere else by the renderer.
publish:
  - provider: github
    owner: leonardo204
    repo: naby
    # Releases stay invisible to the updater until explicitly published, so a
    # half-uploaded set of artifacts is never offered to users.
    releaseType: release

# ---------------------------------------------------------------------------
# npmRebuild — design §3.2
# ---------------------------------------------------------------------------
# electron-builder defaults this to true and would recompile native modules
# against Electron's ABI on every packaging run. The natives that reach this
# build (see asarUnpack) are all N-API prebuilds, which are ABI-stable across
# Electron versions; rebuilding them forfeits the prebuild and forces a full
# native toolchain onto every runner for no benefit.
npmRebuild: false

asar: true

# ---------------------------------------------------------------------------
# What ships
# ---------------------------------------------------------------------------
# The parent's own node_modules is EXCLUDED wholesale, deliberately:
#
#   * nothing needs it. `dist/electron/*` is bundled, and `dist/naby-runtime.mjs`
#     is self-contained by construction (scripts/build-runtime.mjs inlines ai@7
#     and the five provider adapters, leaving only node builtins).
#   * @anthropic-ai/claude-agent-sdk is a parent dependency and is the DEV/TEST
#     engine. Design §3.3: it must never be in a shipped build. Excluding the
#     whole tree makes that structural rather than a glob nobody re-checks.
files:
  - dist/electron/**
  # ---------------------------------------------------------------------
  # THE DEV-ONLY ChatGPT SUBSCRIPTION-OAUTH MODULE MUST NOT SHIP — spec §2
  # ---------------------------------------------------------------------
  # electron/chatgpt-oauth.ts is compiled to dist/electron/chatgpt-oauth.mjs so
  # the DEV flow can load it (boot.ts reaches it through a computed dynamic
  # import). It talks to the UNOFFICIAL ChatGPT backend — a ToS grey zone, the
  # same risk class as the Agent SDK — so it is excluded from the packaged
  # artifact here, giving the "absent from the shipped app" property the runtime
  # flag seal (isChatgptOauthEnabled) already backs. Defense in depth: even with
  # NABY_ENABLE_CHATGPT_OAUTH somehow set, a shipped build cannot load the module.
  - '!dist/electron/chatgpt-oauth.mjs'
  - dist/naby-runtime.mjs
  - package.json
  - '!node_modules/**'
  # The shell (our OpenCockpit fork) ships as the Next app dir. It keeps its own
  # node_modules because Next is resolved out of the shell's tree at runtime.
  #
  # F1-03 has since trimmed the shell to chat + session list + settings: five of
  # the seven feature packages are gone (comments/console/explorer/review/skills,
  # 276 files / ~61k lines) and with them the DB drivers (pg / mysql2 / ioredis /
  # neo4j-driver), the code-map toolchain (web-tree-sitter, @vscode/tree-sitter-wasm),
  # pdfjs-dist, the xterm addons, @xyflow/react + graphology and
  # react-syntax-highlighter. The exclusions below still drop the build-time-only
  # native toolchains, which no trim can remove (they are Next's own deps).
  - shell/package.json
  - shell/next.config.mjs
  - shell/.next-prod/**
  - shell/dist/**
  - shell/public/**
  - shell/packages/**
  - shell/node_modules/**
  # ---------------------------------------------------------------------
  # THE DEV-ONLY ENGINE MUST NOT SHIP — design §3.3
  # ---------------------------------------------------------------------
  # Excluding the parent's node_modules is NOT sufficient, which is a trap
  # worth spelling out. The SHELL has its own dependency on the Claude Agent
  # SDK (upstream OpenCockpit drives Claude Code with it), so it arrives
  # through the shell's tree regardless of what the parent ships.
  #
  # Measured on the first packaging run of this config: 224 MB of
  # `claude-agent-sdk-darwin-arm64` — the non-OSS engine binary — landed
  # INSIDE app.asar. Two separate problems in one: design §3.3 says it is
  # never in a shipped build (the redistribution question the engine pivot
  # exists to avoid), and a binary inside an asar cannot be spawned anyway,
  # so it was pure dead weight. F1-03 removes the feature package that pulls
  # it; until then this exclusion is what keeps it out.
  - '!shell/node_modules/@anthropic-ai/claude-agent-sdk/**'
  - '!shell/node_modules/@anthropic-ai/claude-agent-sdk-*/**'
  - '!shell/node_modules/@rolldown/**'
  - '!shell/node_modules/@rollup/**'
  - '!shell/node_modules/@tailwindcss/oxide*/**'
  - '!shell/node_modules/lightningcss*/**'
  - '!shell/node_modules/@unrs/**'
  - '!shell/node_modules/typescript/**'
  - '!shell/node_modules/eslint*/**'
  - '!shell/node_modules/@typescript-eslint/**'
  - '!shell/node_modules/**/*.map'
  - '!shell/.next-prod/cache/**'

# ---------------------------------------------------------------------------
# asarUnpack — design §3.1
# ---------------------------------------------------------------------------
# Anything dlopen'd or spawn'd must live OUTSIDE the archive; asar is transparent
# to `require` but not to `dlopen`/`LoadLibraryW`/`posix_spawn`.
#
# FINDING, recorded because it contradicts the design's current expectation:
# design §3.3 says the production engine is pure JS and there should be nothing
# to unpack. That is true of OUR engine, but NOT of the shell, which drags in
# native modules of its own. They are listed EXPLICITLY rather than left to
# smartUnpack, whose auto-detection is gated on the file resolving as part of an
# npm module.
#
# RE-AUDITED after F1-03's trim (the audit this comment used to ask for), by
# checking each entry against a clean `npm install` of the trimmed shell:
#   sharp + @img       KEPT — transitive dep of next@16 (image optimisation)
#   @next/swc-*        KEPT — Next's own native compiler
#   node-pty           KEPT — feature-agent's Claude PTY driver still uses it
#   fsevents           KEPT — macOS fs watching, transitive
#   @vscode/ripgrep    KEPT — feature-agent's ollama Grep tool imports rgPath
#   @napi-rs/canvas    DROPPED — was pulled in by pdfjs-dist (explorer's PDF
#                      preview); no longer installed. Only @napi-rs/wasm-runtime
#                      remains and it is pure wasm, nothing to dlopen.
#   web-tree-sitter    DROPPED — feature-explorer's code map was the only user;
#                      package and its WASM copy step are both gone.
#
# NOTE the paths are anchored with a trailing `/**` on the module directory.
# Never compute an unpacked path with `.replace('app.asar', 'app.asar.unpacked')`
# — 'app.asar.unpacked' itself contains 'app.asar', so an already-unpacked path
# becomes `app.asar.unpacked.unpacked/…` → ENOENT, surfacing as a generic spawn
# failure. That is a live upstream bug in node-pty; the same footgun applies to
# any path arithmetic we write ourselves.
asarUnpack:
  - '**/node_modules/sharp/**'
  - '**/node_modules/@img/**'
  - '**/node_modules/@next/swc-*/**'
  - '**/node_modules/node-pty/**'
  - '**/node_modules/fsevents/**'
  - '**/node_modules/@vscode/ripgrep/**'

mac:
  # macos-latest runners are arm64 (design §6.1); per-arch until there is a
  # reason to fight the universal-binary asar merge.
  target:
    - target: dmg
      arch: [arm64]
    # Not optional even though we ship dmg: Squirrel.Mac updates via zip.
    - target: zip
      arch: [arm64]
  category: public.app-category.productivity

  # -------------------------------------------------------------------------
  # Signing (F1-10) — and the one-way door
  # -------------------------------------------------------------------------
  # THE IDENTITY IS PERMANENT. Squirrel.Mac validates a downloaded update against
  # the designated requirement of the app that is ALREADY RUNNING, captured via
  # SecCodeCopySelf(). Change the certificate and every installed user loses
  # auto-update forever and must re-download by hand. Windows has an escape
  # (publisherName takes an array of old and new names); macOS has none.
  #
  # The identity is `Developer ID Application: YONGSUB LEE (XU8HS9JUTS)` and it
  # is pinned via CSC_NAME in the environment rather than named here, because it
  # is a machine/CI credential reference, not a source-controlled fact. What IS
  # source-controlled is the requirement that auto-discovery stays OFF — see
  # scripts/build-dist.mjs, which enforces it before electron-builder starts.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # gatekeeperAssess stays false: `spctl --assess` during the build is checked
  # against a bundle that has not been stapled yet (stapling happens in
  # afterSign), so it would fail on a perfectly good build. The real Gatekeeper
  # verification is done after the fact — see `npm run verify:mac`.
  gatekeeperAssess: false
  # electron-builder 26 has its own built-in notarisation. It is turned OFF here
  # because scripts/notarize.mjs already does it at afterSign; leaving both on
  # submits the same bundle to Apple twice.
  notarize: false

win:
  target:
    - target: nsis
      arch: [x64]
  # -------------------------------------------------------------------------
  # UNSIGNED, DELIBERATELY (design §6.2) — and auto-update still works
  # -------------------------------------------------------------------------
  # electron-updater skips signature verification entirely when `publisherName`
  # is null, which is exactly the unsigned case. No announced expiry. We have no
  # Windows certificate (OV keys have required FIPS 140-2 L2 hardware or a cloud
  # HSM since June 2023, so a .pfx in CI secrets is no longer possible at all),
  # so this ships unsigned and updates fine.
  #
  # WHEN A CERTIFICATE ARRIVES, this becomes a config change and not a rewrite:
  # add `azureSignOptions` (Azure Artifact Signing is the default-correct answer
  # per design §6.3) and set `publisherName` to a LIST containing both the old
  # and the new subject names, so already-installed unsigned clients are not
  # stranded. That array is the escape hatch macOS does not have — do not
  # collapse it to a single string when rotating.
  #
  #   publisherName:
  #     - <previous subject name>
  #     - <new subject name>
  #
  # Timestamping is mandatory rather than best practice under Azure Artifact
  # Signing: its certificates are renewed daily with 72-hour validity, so an
  # untimestamped signature is invalid within days.

dmg:
  # electron-builder defaults this to FALSE, and the default is wrong for a
  # Developer ID release. An unsigned disk image can still be notarised and
  # stapled — Apple tickets it by file hash — and it will open. But it has no
  # code signature of its own, so the documented Gatekeeper assertion for disk
  # images reports exactly that:
  #
  #   spctl -a -t open --context context:primary-signature Naby.dmg
  #     -> rejected (source=no usable signature)
  #
  # Signing it makes the DMG a first-class signed, notarised, stapled artifact
  # and that assertion pass. Order is handled for us: electron-builder signs the
  # dmg before afterAllArtifactBuild runs, so it is sign -> notarise -> staple.
  sign: true

nsis:
  # NSIS is the ONLY updatable Windows target — electron-updater cannot update an
  # MSI (design §6.1). If an MSI is ever added for enterprise deployment it is an
  # ADDITIONAL artifact with its own SCCM/Intune story, never a replacement.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Differential download: electron-updater uses the blockmap to fetch only the
  # changed blocks instead of the whole installer on every patch release.
  differentialPackage: true

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  # The .deb is not a nicety alongside the AppImage — see the header. Chromium's
  # SUID sandbox needs chrome-sandbox root-owned 4755, which a user-owned FUSE
  # mount cannot provide, and Ubuntu 23.10+ blocks the unprivileged-namespace
  # fallback, so an AppImage alone fails to launch without --no-sandbox.
  synopsis: Personalized persona agent desktop app
  desktop:
    entry:
      StartupWMClass: Naby
